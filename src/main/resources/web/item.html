<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Page</title>
    <style>
        body {
          font-family: Arial, sans-serif;
          margin: 0;
          padding: 0;
          background: #f9f9f9;
        }

        /* Navbar */
        .navbar {
          background-color: #333;
          padding: 10px 20px;
          display: flex;
          align-items: center;
        }
        .navbar a {
          color: white;
          text-decoration: none;
          font-size: 18px;
          margin-right: 15px;
        }
        .navbar a:hover {
          text-decoration: underline;
        }

        /* Product Card */
        .product-card {
          max-width: 400px;
          margin: 40px auto;
          background: white;
          border-radius: 10px;
          box-shadow: 0 4px 8px rgba(0,0,0,0.1);
          padding: 20px;
          text-align: center;
        }

        .product-name {
          font-size: 22px;
          font-weight: bold;
          margin: 15px 0 5px;
        }

        .price {
          font-size: 20px;
          color: #27ae60;
          margin: 5px 0;
        }

        .description {
          font-size: 14px;
          color: #555;
          margin: 10px 0;
        }

        .details {
          font-size: 14px;
          margin: 10px 0;
          text-align: left;
        }

        .add-btn {
          display: inline-block;
          margin-top: 15px;
          padding: 10px 20px;
          background: #007BFF;
          color: white;
          border: none;
          border-radius: 5px;
          cursor: pointer;
          font-size: 16px;
        }

        .add-btn:hover {
          background: #0056b3;
        }
        .scroll-container {
  background-color: #333;
  overflow: auto;
  white-space: nowrap;
  padding: 10px;
}

.scroll-container img {
  height: 50vh;
  width: auto;
  object-fit: contain;
  padding: 10px;
}

    </style>
</head>
<body>

<div class="navbar">
    <a href="/home">Home</a>
</div>

<div class="product-card">
    <div class="scroll-container">
        {{ image }}
    </div>
    <div class="product-name">{{ name }}</div>
    <div class="price">${{ price }}</div>
    <div class="description">
        {{ description }}
    </div>
    <div class="details">
        <strong>Seller:</strong> {{ seller }} <br>
        <strong>Warranty:</strong> Valid until {{ warranty }}
    </div>
    <button class="add-btn">Add to Cart</button>
</div>
</body>
</html>
